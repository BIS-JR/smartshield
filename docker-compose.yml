version: '3.8'
services:
  postgres:
    image: postgres:16
    container_name: smartshield-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: smartshield
      POSTGRES_PASSWORD: smartshield
      POSTGRES_DB: smartshield
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  adminer:
    image: adminer
    restart: unless-stopped
    ports:
      - "8081:8080"

volumes:
  pgdata:
