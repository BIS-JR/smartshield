databases:
  - name: smartshield-db
    plan: free
    databaseName: smartshield
    user: smartshield

services:
  - type: web
    name: smartshield
    runtime: node
    plan: free
    buildCommand: >
      corepack enable &&
      pnpm install --frozen-lockfile &&
      pnpm --filter @smartshield/shared build &&
      pnpm --filter api exec prisma generate &&
      pnpm --filter web build &&
      pnpm --filter api build
    startCommand: >
      pnpm --filter api exec prisma migrate deploy &&
      pnpm --filter api exec tsx prisma/seed.ts &&
      node apps/api/dist/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: smartshield-db
          property: connectionString
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_ACCESS_EXPIRES_IN
        value: 15m
      - key: JWT_REFRESH_EXPIRES_IN
        value: 30d
      - key: WEB_ORIGIN
        sync: false
      - key: GOOGLE_CLIENT_ID
        value: ""
      - key: GOOGLE_CLIENT_SECRET
        value: ""
      - key: SMTP_HOST
        value: ""
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        value: ""
      - key: SMTP_PASSWORD
        value: ""
      - key: SMTP_FROM
        value: "SmartShield <no-reply@smartshield.local>"
      - key: DECISION_ENGINE
        value: simulated
